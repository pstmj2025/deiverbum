services:
  - type: web
    name: dei-verbum-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run db:generate
    startCommand: cd backend && npm run db:deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: dei-verbum-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: API_URL
        value: https://dei-verbum-api.onrender.com
      - key: FRONTEND_URL
        value: https://dei-verbum.vercel.app
      - key: REDIS_URL
        fromService:
          type: redis
          name: dei-verbum-redis
          property: connectionString
      - key: ASAAS_ENV
        value: sandbox
      - key: STORE_NAME
        value: DEI VERBUM
      - key: STORE_EMAIL
        value: contato@deiverbum.com.br

  - type: redis
    name: dei-verbum-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: dei-verbum-db
    plan: free
    databaseName: dei_verbum
    user: dei_verbum_user
